function AtBats({lineup,setLineup,currentBatter,setCurrentBatter,currentInning,setCurrentInning,innings,setInnings}){
  const active=lineup.filter(p=>p.active);
  const[bases,setBases]=useState({first:null,second:null,third:null});
  const[showInn,setShowInn]=useState(false);
  const[pendRuns,setPendRuns]=useState(0);
  const[toast,setToast]=useState(null);
  const[rbiPrompt,setRbiPrompt]=useState(null);
  const[dpPrompt,setDpPrompt]=useState(false);
  const[fcPrompt,setFcPrompt]=useState(false);
  const[manualRbiPrompt,setManualRbiPrompt]=useState(null); // {runner, scored already}
  const outs=countOuts(lineup,currentInning);
  const us=totalScore(innings,"us"),them=totalScore(innings,"them");

  const anyOnBase=!!(bases.first||bases.second||bases.third);
  const runnersOnBase=Object.values(bases).filter(Boolean).length;

  const markScored=useCallback((snap,names,inn)=>snap.map(p=>{if(!names.includes(p.name))return p;let done=false;return{...p,atBats:[...p.atBats].reverse().map(a=>{if(!done&&a.inning===inn&&!a.scored){done=true;return{...a,scored:true};}return a;}).reverse()};}),[] );
  const togScored=(n,i)=>setLineup(prev=>prev.map(p=>p.name===n?{...p,atBats:p.atBats.map((a,x)=>x===i?{...a,scored:!a.scored}:a)}:p));
  const remAB=(n,i)=>setLineup(prev=>prev.map(p=>p.name===n?{...p,atBats:p.atBats.filter((_,x)=>x!==i)}:p));

  const checkInningEnd=useCallback((extraOuts=0)=>{
    // Compute outs fresh from latest lineup state inside setTimeout to avoid stale closure
    setTimeout(()=>setLineup(snap=>{
      const currentOuts=countOuts(snap,currentInning);
      if(currentOuts+extraOuts>=OUTS_PER_INNING){
        const r=snap.filter(p=>p.active).reduce((s,p)=>s+p.atBats.filter(a=>a.inning===currentInning&&a.scored).length,0);
        setPendRuns(r);setShowInn(true);
      }
      return snap;
    }),150);
  },[currentInning]);

  const nextBatter=useCallback((outDef,extraOuts=0)=>{
    setCurrentBatter(prev=>(prev+1)%active.length);
    if(outDef?.isOut) checkInningEnd(extraOuts);
  },[active.length,checkInningEnd]);

  const confirmRBI=useCallback((rbi)=>{
    if(!rbiPrompt)return;
    const{idx,name,newBases,scored,outDef}=rbiPrompt;
    setLineup(prev=>{let n=prev.map(p=>p.name===name?{...p,atBats:p.atBats.map((a,i)=>i===idx?{...a,rbi}:a)}:p);if(scored.length)n=markScored(n,scored,currentInning);return n;});
    setBases(newBases);
    if(scored.length)setToast({names:scored});
    setRbiPrompt(null);nextBatter(outDef);
  },[rbiPrompt,currentInning,markScored,nextBatter]);

  const confirmDP=useCallback((selected)=>{
    const bat=active[currentBatter];if(!bat)return;
    // Record batter out (AB counts)
    setLineup(prev=>prev.map(p=>p.name===bat.name?{...p,atBats:[...p.atBats,{inning:currentInning,outcome:"DP",scored:false,rbi:0}]}:p));
    // Remove retired runners from bases
    const newBases={...bases};
    if(!selected.includes("batter")){
      // batter is NOT one of the outs — means batter reached, 2 runners out
      // batter stays off base for simplicity (hit into DP, batter out is default)
    }
    ["first","second","third"].forEach(b=>{
      if(selected.includes(b))newBases[b]=null;
    });
    setBases(newBases);
    setDpPrompt(false);
    setCurrentBatter(prev=>(prev+1)%active.length);
    setTimeout(()=>setLineup(snap=>{
      const currentOuts=countOuts(snap,currentInning);
      if(currentOuts>=OUTS_PER_INNING){
        const r=snap.filter(p=>p.active).reduce((s,p)=>s+p.atBats.filter(a=>a.inning===currentInning&&a.scored).length,0);
        setPendRuns(r);setShowInn(true);
      }
      return snap;
    }),150);
  },[active,currentBatter,currentInning,bases]);

  const onRunnerScored=useCallback((runnerName)=>{
    // Mark the runner's most recent at-bat in this inning as scored
    setLineup(prev=>prev.map(p=>{
      if(p.name!==runnerName)return p;
      let done=false;
      return{...p,atBats:[...p.atBats].reverse().map(a=>{
        if(!done&&a.inning===currentInning&&!a.scored){done=true;return{...a,scored:true};}
        return a;
      }).reverse()};
    }));
    setToast({names:[runnerName]});
    // Prompt for RBI — ask which active batter gets credit
    setManualRbiPrompt({runner:runnerName});
  },[currentInning]);

  const confirmManualRbi=useCallback((batterName)=>{
    if(!batterName){setManualRbiPrompt(null);return;}
    // Add 1 RBI to the most recent at-bat of the selected batter
    setLineup(prev=>prev.map(p=>{
      if(p.name!==batterName)return p;
      const abs=[...p.atBats];
      // find last AB in current inning
      for(let i=abs.length-1;i>=0;i--){
        if(abs[i].inning===currentInning){abs[i]={...abs[i],rbi:(abs[i].rbi||0)+1};break;}
      }
      return{...p,atBats:abs};
    }));
    setManualRbiPrompt(null);
  },[currentInning]);

  const confirmFC=useCallback((outBase)=>{
    const bat=active[currentBatter];if(!bat)return;
    // Batter reaches 1st, selected runner is out
    const{newBases}=advanceBases(bases,"FC",bat.name);
    newBases[outBase]=null; // remove the put-out runner
    setLineup(prev=>prev.map(p=>p.name===bat.name?{...p,atBats:[...p.atBats,{inning:currentInning,outcome:"FC",scored:false,rbi:0}]}:p));
    setBases(newBases);
    setFcPrompt(false);
    const outDef={isOut:true};
    nextBatter(outDef);
  },[active,currentBatter,currentInning,bases,nextBatter]);

  function advanceBases(bases,outcome,bn){
    let{first:f,second:s,third:t}=bases,scored=[];

    if(outcome==="HR"){
      scored=[t,s,f,bn].filter(Boolean);
      return{newBases:{first:null,second:null,third:null},scored};
    }

    // For hits: each runner advances exactly N bases, no wrapping past home
    // 1B: +1  2B: +2  3B: +3
    // bases ranked: first=1, second=2, third=3, home(scored)=4
    if(outcome==="1B"||outcome==="2B"||outcome==="3B"){
      const adv={["1B"]:1,["2B"]:2,["3B"]:3}[outcome];
      const rank={first:1,second:2,third:3};
      const newPos={};// base -> runner name after advancing
      // advance each existing runner
      [["third",t],["second",s],["first",f]].forEach(([base,runner])=>{
        if(!runner)return;
        const newRank=rank[base]+adv;
        if(newRank>=4){scored.push(runner);}
        else{const newBase=Object.keys(rank).find(k=>rank[k]===newRank);if(newBase)newPos[newBase]=runner;}
      });
      // place batter at their new base
      const batterRank=adv;
      if(batterRank>=4){scored.push(bn);}
      else{const batterBase=Object.keys(rank).find(k=>rank[k]===batterRank);if(batterBase)newPos[batterBase]=bn;}
      return{newBases:{first:newPos.first||null,second:newPos.second||null,third:newPos.third||null},scored};
    }

    // BB and HBP — force advance only if base occupied ahead
    if(outcome==="BB"||outcome==="HBP"){
      if(f&&s&&t){scored=[t];return{newBases:{first:bn,second:f,third:s},scored};}
      if(f&&s)return{newBases:{first:bn,second:f,third:s},scored:[]};
      if(f)return{newBases:{first:bn,second:f,third:t},scored:[]};
      return{newBases:{first:bn,second:s,third:t},scored:[]};
    }

    if(outcome==="SAC"){if(t)scored=[t];return{newBases:{first:f,second:s,third:null},scored};}
    // Error — batter reaches 1st, runners hold
    if(outcome==="E"){return{newBases:{first:bn,second:s,third:t},scored:[]};}
    // FC — batter reaches 1st, one runner out (handled in confirmFC)
    if(outcome==="FC"){return{newBases:{first:bn,second:s,third:t},scored:[]};}
    // IFF — batter out, no base changes
    if(outcome==="IFF"){return{newBases:bases,scored:[]};}
    return{newBases:bases,scored:[]};
  }

  const logOutcome=useCallback((key)=>{
    const bat=active[currentBatter];if(!bat)return;
    // DP: open modal if >1 runner, auto-out batter+runner if exactly 1 runner
    if(key==="DP"){
      if(runnersOnBase>1){setDpPrompt(true);}
      else if(runnersOnBase===1){
        // Only 1 runner — batter AND that runner are both out automatically
        const outBase=Object.entries(bases).find(([,v])=>v)?.[0];
        const newBases={...bases};
        if(outBase)newBases[outBase]=null;
        setLineup(prev=>prev.map(p=>p.name===bat.name?{...p,atBats:[...p.atBats,{inning:currentInning,outcome:"DP",scored:false,rbi:0}]}:p));
        setBases(newBases);
        setCurrentBatter(prev=>(prev+1)%active.length);
        setTimeout(()=>setLineup(snap=>{const currentOuts=countOuts(snap,currentInning);if(currentOuts>=OUTS_PER_INNING){const r=snap.filter(p=>p.active).reduce((s,p)=>s+p.atBats.filter(a=>a.inning===currentInning&&a.scored).length,0);setPendRuns(r);setShowInn(true);}return snap;}),150);
      }
      return;
    }
    // FC: open modal to pick which runner is out
    if(key==="FC"){setFcPrompt(true);return;}
    // IFF: batter is out, no base changes, no RBI prompt
    if(key==="IFF"){
      setLineup(prev=>prev.map(p=>p.name===bat.name?{...p,atBats:[...p.atBats,{inning:currentInning,outcome:"IFF",scored:false,rbi:0}]}:p));
      nextBatter({isOut:true});
      return;
    }
    const outDef=OUTCOMES.find(o=>o.key===key);
    const{newBases,scored}=advanceBases(bases,key,bat.name);
    // HR: auto-calculate RBI as runners scored + batter
    if(key==="HR"){
      const autoRBI=scored.length; // scored includes batter already from advanceBases
      setLineup(prev=>prev.map(p=>p.name===bat.name?{...p,atBats:[...p.atBats,{inning:currentInning,outcome:key,scored:false,rbi:autoRBI}]}:p));
      setBases(newBases);
      setLineup(prev=>markScored(prev,scored,currentInning));
      if(scored.length)setToast({names:scored});
      nextBatter(outDef);
      return;
    }
    const skipRBI=["K","FO","FLOUT","GO","E"].includes(key)||!anyOnBase;
    setLineup(prev=>prev.map(p=>p.name===bat.name?{...p,atBats:[...p.atBats,{inning:currentInning,outcome:key,scored:false,rbi:0}]}:p));
    if(skipRBI){
      setBases(newBases);
      if(scored.length){setLineup(prev=>markScored(prev,scored,currentInning));setToast({names:scored});}
      nextBatter(outDef);
    } else {
      const idx=lineup.find(p=>p.name===bat.name)?.atBats.length??0;
      setRbiPrompt({name:bat.name,idx,newBases,scored,outDef});
    }
  },[active,currentBatter,currentInning,outs,bases,runnersOnBase,markScored,nextBatter,lineup]);

  const innConfirm=(r)=>{setInnings(prev=>prev.map((inn,i)=>i===currentInning-1?{...inn,us:String(r)}:inn));if(currentInning<TOTAL_INNINGS)setCurrentInning(currentInning+1);setBases({first:null,second:null,third:null});setShowInn(false);};

  const bat=active[currentBatter];
  const od=Array.from({length:OUTS_PER_INNING},(_,i)=>i<outs);
  const ron=[bases.third&&`3B: ${bases.third.split(" ").pop()}`,bases.second&&`2B: ${bases.second.split(" ").pop()}`,bases.first&&`1B: ${bases.first.split(" ").pop()}`].filter(Boolean);

  return <div>
    {showInn&&<InningModal inning={currentInning} runs={pendRuns} onConfirm={innConfirm}/>}
    {rbiPrompt&&<RBIModal name={rbiPrompt.name} onConfirm={confirmRBI}/>}
    {toast&&<Toast names={toast.names} onDone={()=>setToast(null)}/>}
    {dpPrompt&&bat&&<DPModal batter={bat.name} bases={bases} onConfirm={confirmDP} onClose={()=>setDpPrompt(false)}/>}
    {fcPrompt&&bat&&<FCModal batter={bat.name} bases={bases} onConfirm={confirmFC} onClose={()=>setFcPrompt(false)}/>}
    {manualRbiPrompt&&<ManualRbiModal runner={manualRbiPrompt.runner} active={active} currentInning={currentInning} onConfirm={confirmManualRbi}/>}

    {/* ── Sticky game header ── */}
    <div style={{position:"sticky",top:107,zIndex:79,background:C.bg,borderBottom:`1px solid ${C.border}44`,marginBottom:10}}>

      {/* Row 1: Innings across full width */}
      <div style={{display:"flex",gap:3,alignItems:"center",padding:"6px 4px 6px",overflowX:"auto",borderBottom:`1px solid ${C.border}33`}}>
        <span style={{color:C.textDim,fontFamily:"'Oswald',sans-serif",fontSize:9,letterSpacing:1,flexShrink:0,marginRight:2}}>INN</span>
        {Array.from({length:TOTAL_INNINGS},(_,i)=>i+1).map(n=>(
          <button key={n} onClick={()=>{setCurrentInning(n);setBases({first:null,second:null,third:null});}}
            style={{background:currentInning===n?C.gold:C.bgRow,border:`2px solid ${currentInning===n?C.gold:C.border}`,color:currentInning===n?"#000":C.textMid,borderRadius:5,padding:"3px 0",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:12,flexShrink:0,width:30,textAlign:"center"}}>
            {n}
          </button>
        ))}
      </div>

      {/* Row 2: Score | Outs | Diamond — side by side */}
      <div style={{display:"flex",alignItems:"center",padding:"6px 8px 8px",gap:0}}>

        {/* Score block */}
        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0,paddingRight:12}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:8,color:C.textDim,letterSpacing:1,marginBottom:1}}>US</div>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:30,fontWeight:900,color:C.gold,lineHeight:1}}>{us}</div>
          </div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:14,color:C.border,padding:"0 2px",marginTop:10}}>—</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:8,color:C.textDim,letterSpacing:1,marginBottom:1}}>THEM</div>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:30,fontWeight:900,color:C.textMid,lineHeight:1}}>{them}</div>
          </div>
        </div>

        <div style={{width:1,alignSelf:"stretch",background:C.border,margin:"0 12px",flexShrink:0}}/>

        {/* Outs block */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,flexShrink:0,paddingRight:12}}>
          <span style={{fontFamily:"'Oswald',sans-serif",fontSize:8,color:C.textDim,letterSpacing:1}}>OUTS</span>
          <div style={{display:"flex",gap:5}}>
            {od.map((f,i)=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:f?C.red:"transparent",border:`2px solid ${f?C.red:C.border}`}}/>)}
          </div>
        </div>

        <div style={{width:1,alignSelf:"stretch",background:C.border,margin:"0 12px",flexShrink:0}}/>

        {/* Diamond — fills remaining width */}
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",minWidth:90}}>
          <Diamond bases={bases} setBases={setBases} onScored={onRunnerScored}/>
        </div>

      </div>
    </div>

    {/* Batter card */}
    {bat&&<div style={{background:C.bgCard,borderRadius:16,padding:16,marginBottom:14,border:`2px solid ${C.gold}`}}>
      <div style={{color:C.textMid,fontFamily:"'Oswald',sans-serif",fontSize:10,letterSpacing:3,marginBottom:4}}>NOW BATTING</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:900,color:C.text}}><span style={{color:C.gold}}>#{currentBatter+1} </span>{bat.name}</div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,color:C.textMid}}>{bat.atBats.length} PA · {calcStats(bat.atBats).ab} AB</div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {OUTCOMES.map(o=>{
          // SAC disabled if 2 outs or no runners on base
          const sacDisabled=(o.key==="SAC"&&(outs>=2||!anyOnBase));
          // DP disabled if 2 outs OR no runners on base
          const dpDisabled=(o.key==="DP"&&(outs>=2||!anyOnBase));
          // FC disabled if no runners on base
          const fcDisabled=(o.key==="FC"&&!anyOnBase);
          // IFF only valid: runners on 1st AND 2nd (or bases loaded), less than 2 outs
          const iffDisabled=(o.key==="IFF"&&(outs>=2||!bases.first||!bases.second));
          const isDisabled=sacDisabled||dpDisabled||fcDisabled||iffDisabled;
          // HR: show auto-RBI count as hint
          const hrHint=o.key==="HR"&&runnersOnBase>0?`${runnersOnBase+1} RBI`:"";
          // HBP hint
          const hbpHint=o.key==="HBP"?"like BB":"";
          return <button key={o.key} onClick={()=>!isDisabled&&logOutcome(o.key)} style={{background:isDisabled?C.bgRow:o.color+"22",border:`2px solid ${isDisabled?C.border:o.color}`,color:isDisabled?C.textDim:o.color,borderRadius:10,padding:"9px 12px",cursor:isDisabled?"not-allowed":"pointer",fontFamily:"'Oswald',sans-serif",fontSize:12,fontWeight:700,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:62,opacity:isDisabled?0.35:1,transition:"background 0.15s"}} onMouseEnter={e=>{if(!isDisabled)e.currentTarget.style.background=o.color+"44";}} onMouseLeave={e=>{if(!isDisabled)e.currentTarget.style.background=o.color+"22";}}>
            <span style={{fontSize:18}}>{o.icon}</span>
            <span>{o.label}</span>
            {o.noAB&&<span style={{fontSize:8,color:isDisabled?C.textDim:o.color+"99"}}>no AB</span>}
            {hrHint&&<span style={{fontSize:8,color:C.gold+"cc"}}>{hrHint}</span>}
            {hbpHint&&<span style={{fontSize:8,color:isDisabled?C.textDim:o.color+"99"}}>{hbpHint}</span>}
            {o.key==="DP"&&<span style={{fontSize:8,color:isDisabled?C.textDim:o.color+"99"}}>2 outs</span>}
            {o.key==="IFF"&&<span style={{fontSize:8,color:isDisabled?C.textDim:o.color+"99"}}>batter out</span>}
            {o.key==="FC"&&<span style={{fontSize:8,color:isDisabled?C.textDim:o.color+"99"}}>reaches 1st</span>}
            {o.key==="E"&&<span style={{fontSize:8,color:isDisabled?C.textDim:o.color+"99"}}>reaches base</span>}
          </button>;
        })}
      </div>
    </div>}

    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {active.map((p,i)=>{const iABs=p.atBats.map((a,gi)=>({...a,gi})).filter(a=>a.inning===currentInning);const isUp=i===currentBatter,onBase=bases.first===p.name||bases.second===p.name||bases.third===p.name;const bl=bases.third===p.name?"3B":bases.second===p.name?"2B":bases.first===p.name?"1B":null;const st=calcStats(p.atBats);
      return <div key={p.name} onClick={()=>setCurrentBatter(i)} style={{background:isUp?C.bgRow:C.bgCard,border:`2px solid ${isUp?C.gold:onBase?C.gold+"33":C.border}`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",cursor:"pointer"}}>
        <span style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:15,color:isUp?C.gold:C.textDim,minWidth:22}}>{i+1}</span>
        {onBase?<div style={{width:20,height:20,background:C.gold,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#000",fontFamily:"'Oswald',sans-serif",transform:"rotate(45deg)",flexShrink:0}}><span style={{transform:"rotate(-45deg)"}}>{bl}</span></div>:<div style={{width:20,height:20,flexShrink:0}}/>}
        <span style={{fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:14,color:isUp?C.text:C.textMid,minWidth:110}}>{p.name}</span>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",flex:1,alignItems:"center"}}>{iABs.map((a,j)=><div key={j} style={{display:"flex",alignItems:"center",gap:3}}><Badge k={a.outcome}/><div onClick={e=>{e.stopPropagation();togScored(p.name,a.gi);}} style={{width:20,height:20,borderRadius:5,cursor:"pointer",background:a.scored?C.green:"transparent",border:`2px solid ${a.scored?C.green:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:a.scored?"#fff":C.textDim,flexShrink:0}}>{a.scored?"R":""}</div>{(a.rbi||0)>0&&<span style={{fontFamily:"'Oswald',sans-serif",fontSize:10,color:C.gold,fontWeight:700}}>{a.rbi}RBI</span>}{isUp&&<div onClick={e=>{e.stopPropagation();remAB(p.name,a.gi);}} style={{color:C.textDim,cursor:"pointer",fontSize:12}}>✕</div>}</div>)}</div>
        {(st.r>0||st.rbi>0)&&<div style={{display:"flex",gap:8,marginLeft:"auto"}}>{st.r>0&&<span style={{fontFamily:"'Oswald',sans-serif",fontSize:12,color:C.green,fontWeight:700}}>R:{st.r}</span>}{st.rbi>0&&<span style={{fontFamily:"'Oswald',sans-serif",fontSize:12,color:C.gold,fontWeight:700}}>RBI:{st.rbi}</span>}</div>}
      </div>;})}
    </div>
    <p style={{color:C.textDim,fontFamily:"'Oswald',sans-serif",fontSize:11,marginTop:10,textAlign:"center"}}>Tap □ beside any at-bat to manually toggle a run scored.</p>
  </div>;
}


// ── In-game stats ──────────────────────────────────────────────────────────
function Stats({lineup}){
  const active=lineup.filter(p=>p.atBats.length>0);
  const rows=active.map(p=>({name:p.name,...calcStats(p.atBats)}));
  const tot=["ab","hits","bb","sac","k","hr","r","rbi","tb"].reduce((a,k)=>({...a,[k]:rows.reduce((s,r)=>s+r[k],0)}),{gp:null});
  const{ab:tAB,hits:tH,bb:tBB,sac:tSAC}=tot;
  tot.avg=tAB>0?fmt3(tH/tAB):".000";tot.obp=(tAB+tBB+tSAC)>0?fmt3((tH+tBB+tSAC)/(tAB+tBB+tSAC)):".000";
  tot.slg=tAB>0?fmt3(tot.tb/tAB):".000";tot.ops=tAB>0?fmt3(parseFloat("0"+tot.obp)+parseFloat("0"+tot.slg)):".000";
  const clr=v=>parseFloat(v)>=0.5?C.green:parseFloat(v)>=0.35?C.gold:C.textMid;
  if(!rows.length)return <p style={{color:C.textMid,fontFamily:"'Oswald',sans-serif"}}>No at-bats yet.</p>;
  return <div style={{overflowX:"auto"}}><table style={{borderCollapse:"collapse",width:"100%",minWidth:680}}><thead><tr>{["PLAYER","G","AB","H","R","RBI","BB","SAC","K","HR","AVG","OBP","SLG","OPS"].map(c=><th key={c} style={TH(c==="PLAYER"?"left":"center")}>{c}</th>)}</tr></thead><tbody>{[...rows,{...tot,name:"TOTALS",isTotal:true}].map((r,i)=><tr key={i} style={{background:r.isTotal?C.bg:i%2===0?C.bgCard:C.bgRow}}><td style={{...TD("left"),color:r.isTotal?C.gold:C.text,fontWeight:r.isTotal?900:600,paddingLeft:12}}>{r.name}</td><td style={{...TD(),color:C.textMid}}>{r.gp===null?"—":r.gp||1}</td><td style={TD()}>{r.ab}</td><td style={TD()}>{r.hits}</td><td style={{...TD(),color:r.r>0?C.green:C.textDim,fontWeight:r.r>0?700:400}}>{r.r}</td><td style={{...TD(),color:r.rbi>0?C.gold:C.textDim,fontWeight:r.rbi>0?700:400}}>{r.rbi}</td><td style={TD()}>{r.bb}</td><td style={TD()}>{r.sac}</td><td style={TD()}>{r.k}</td><td style={{...TD(),color:r.hr>0?C.red:C.textDim,fontWeight:r.hr>0?700:400}}>{r.hr}</td>{[r.avg,r.obp,r.slg,r.ops].map((v,j)=><td key={j} style={{...TD(),color:clr(v),fontWeight:700}}>{v}</td>)}</tr>)}</tbody></table></div>;
}

// ── Game Summary ───────────────────────────────────────────────────────────
function Summary({lineup,innings,opp,gameInfo,teamId,teamName,seasons,setSeasons}){
  const us=totalScore(innings,"us"),them=totalScore(innings,"them");
  const active=lineup.filter(p=>p.active);
  const[copied,setCopied]=useState(false);
  const[saved,setSaved]=useState(false);
  const rows=active.map((p,i)=>{const s=calcStats(p.atBats);return{pos:i+1,name:p.name,ab:s.ab,r:s.r,h:s.hits,s1:s.singles,s2:s.doubles,s3:s.triples,hr:s.hr,bb:s.bb,rbi:s.rbi,so:s.k,sac:s.sac};});
  const hdr=["Pos","Player","AB","R","H","1B","2B","3B","HR","BB","RBI","SO","SAC","E"].join("\t");
  const drows=rows.map(r=>[r.pos,r.name,r.ab,r.r,r.h,r.s1,r.s2,r.s3,r.hr,r.bb,r.rbi,r.so,r.sac,0].join("\t"));
  const sl=`${teamName||"Our Team"} ${us} — ${opp||"Opponent"} ${them}`;
  const il=`Innings: ${innings.map(i=>i.us||"0").join(" | ")} (Us) / ${innings.map(i=>i.them||"0").join(" | ")} (Opp)`;
  const txt=[sl,gameInfo?`${gameInfo.date} · ${gameInfo.time} · ${gameInfo.loc}`:"","",il,"",hdr,...drows].join("\n");
  const copy=()=>{navigator.clipboard.writeText(txt);setCopied(true);setTimeout(()=>setCopied(false),2500);};
  const saveGame=()=>{
    const year=gameInfo?.date?new Date(gameInfo.date).getFullYear().toString():new Date().getFullYear().toString();
    const gameKey=`${gameInfo?.date||Date.now()}_${opp||"opp"}`.replace(/[^a-zA-Z0-9_]/g,"_");
    const gameData={opp:opp||"Opponent",date:gameInfo?.date||"",time:gameInfo?.time||"",loc:gameInfo?.loc||"",finalUs:String(us),finalThem:String(them),innings,lineup:active.map(p=>({name:p.name,atBats:p.atBats}))};
    const updated={...seasons,[year]:{...(seasons[year]||{}),[gameKey]:gameData}};
    setSeasons(updated);tSave(teamId,"seasons",updated);setSaved(true);
  };
  const result=us>them?"WIN 🏆":them>us?"LOSS":"TIE";
  const rc=us>them?C.green:them>us?C.red:C.textMid;
  const cols=["Pos","Player","AB","R","H","1B","2B","3B","HR","BB","RBI","SO","SAC","E"];
  const tot2=rows.reduce((a,r)=>({ab:a.ab+r.ab,r:a.r+r.r,h:a.h+r.h,s1:a.s1+r.s1,s2:a.s2+r.s2,s3:a.s3+r.s3,hr:a.hr+r.hr,bb:a.bb+r.bb,rbi:a.rbi+r.rbi,so:a.so+r.so,sac:a.sac+r.sac}),{ab:0,r:0,h:0,s1:0,s2:0,s3:0,hr:0,bb:0,rbi:0,so:0,sac:0});
  return <div>
    <div style={{background:C.bg,borderRadius:12,padding:"16px 20px",marginBottom:16,border:`1px solid ${C.gold}44`}}>
      <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:20,color:C.text,marginBottom:4}}>{sl}</div>
      <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:16,color:rc,marginBottom:4}}>{result}</div>
      {gameInfo&&<div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:C.textMid}}>{gameInfo.date}{gameInfo.time?` · ${gameInfo.time}`:""}{gameInfo.loc?` · `:<span/>}{gameInfo.loc&&<span style={{color:C.gold}}>{gameInfo.loc}</span>}</div>}
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,color:C.textMid,marginTop:6}}>{il}</div>
    </div>
    <div style={{marginBottom:16}}>
      {saved?<div style={{background:"#0d2b18",border:`1px solid ${C.green}`,borderRadius:10,padding:"12px 16px",fontFamily:"'Oswald',sans-serif",fontSize:14,color:C.green}}>✓ Saved to {gameInfo?.date?new Date(gameInfo.date).getFullYear():new Date().getFullYear()} season stats!</div>
      :<button onClick={saveGame} style={{...BTN("#1a2f1a",C.green),border:`2px solid ${C.green}`,padding:"12px 22px",fontSize:15,width:"100%"}}>💾 Save Game to Season Stats</button>}
    </div>
    <div style={{overflowX:"auto",marginBottom:16}}>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,letterSpacing:2,color:C.gold,marginBottom:8}}>GAME STATS — {opp} {gameInfo?.date||""}</div>
      <table style={{borderCollapse:"collapse",width:"100%",minWidth:700,background:C.bgCard}}>
        <thead><tr style={{background:"#0a1628"}}>{cols.map(c=><th key={c} style={{...TH(c==="Player"?"left":"center"),background:"#0a1628",fontSize:11,padding:c==="Player"?"9px 12px":"9px 6px"}}>{c}</th>)}</tr></thead>
        <tbody>
          {rows.map((r,i)=><tr key={i} style={{background:i%2===0?C.bgCard:C.bgRow}}>
            <td style={{...TD(),color:C.gold,fontWeight:700}}>{r.pos}</td>
            <td style={{...TD("left"),paddingLeft:12,color:C.text,fontWeight:600,whiteSpace:"nowrap"}}>{r.name}</td>
            <td style={{...TD(),color:r.ab>0?C.text:C.textDim}}>{r.ab||""}</td>
            <td style={{...TD(),color:r.r>0?C.green:C.textDim,fontWeight:r.r>0?700:400}}>{r.r||""}</td>
            <td style={{...TD(),color:r.h>0?C.green:C.textDim,fontWeight:r.h>0?700:400}}>{r.h||""}</td>
            <td style={TD()}>{r.s1||""}</td><td style={TD()}>{r.s2||""}</td><td style={TD()}>{r.s3||""}</td>
            <td style={{...TD(),color:r.hr>0?C.red:C.textDim,fontWeight:r.hr>0?700:400}}>{r.hr||""}</td>
            <td style={TD()}>{r.bb||""}</td>
            <td style={{...TD(),color:r.rbi>0?C.gold:C.textDim,fontWeight:r.rbi>0?700:400}}>{r.rbi||""}</td>
            <td style={{...TD(),color:r.so>0?C.red:C.textDim}}>{r.so||""}</td>
            <td style={TD()}>{r.sac||""}</td><td style={{...TD(),color:C.textDim}}>0</td>
          </tr>)}
          <tr style={{background:"#0a1628",borderTop:`2px solid ${C.gold}44`}}>
            <td style={{...TD(),color:C.gold,fontWeight:900}} colSpan={2}>TOTALS</td>
            {[tot2.ab,tot2.r,tot2.h,tot2.s1,tot2.s2,tot2.s3,tot2.hr,tot2.bb,tot2.rbi,tot2.so,tot2.sac,"—"].map((v,j)=><td key={j} style={{...TD(),color:C.gold,fontWeight:700}}>{v}</td>)}
          </tr>
        </tbody>
      </table>
    </div>
    <button onClick={copy} style={{...BTN(C.gold,"#000"),padding:"11px 22px",fontSize:14}}>{copied?"✓ Copied!":"📋 Copy Stats"}</button>
  </div>;
}

// ── Main App ───────────────────────────────────────────────────────────────
// ── Keep Supabase awake ─────────────────────────────────────────────────────
// Pings the DB on every app load so the free tier never pauses
function usePingSupabase(){
  useEffect(()=>{
    fetch(`${SUPA_URL}/rest/v1/spt_global?limit=1`,{
      headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}
    }).catch(()=>{}); // silent — we don't care about the response
  },[]);
}

function App(){
  usePingSupabase();
  const[authScreen,setAuthScreen]=useState("landing");
  const[team,setTeam]=useState(null);
  const[roster,setRoster]=useState([]);
  const[schedule,setSchedule]=useState([]);
  const[seasons,setSeasons]=useState({});
  const[screen,setScreen]=useState("schedule");
  const[gameInfo,setGameInfo]=useState(null);
  const[lineup,setLineup]=useState([]);
  const[innings,setInnings]=useState(emptyInnings());
  const[cb,setCB]=useState(0);
  const[ci,setCI]=useState(1);
  const[tab,setTab]=useState("atbats");

  const onLogin=async(teamData)=>{
    const{teamId}=teamData;
    try{
      const[r,s,se]=await Promise.all([
        tLoad(teamId,"roster",[]),
        tLoad(teamId,"schedule",[]),
        tLoad(teamId,"seasons",{})
      ]);
      setRoster(r);setSchedule(s);setSeasons(se);
      setTeam(teamData);setScreen("schedule");setAuthScreen("app");
    }catch(e){
      // fallback: try localStorage
      setRoster([]);setSchedule([]);setSeasons({});
      setTeam(teamData);setScreen("schedule");setAuthScreen("app");
    }
  };
  const onLogout=()=>{if(!confirm("Sign out?"))return;setTeam(null);setAuthScreen("landing");setRoster([]);setSchedule([]);setSeasons({});};
  const startGame=g=>{setLineup(roster.map(n=>({name:n,active:true,atBats:[]})));setGameInfo(g);setScreen("lineup");};
  const confirmLineup=()=>{setInnings(emptyInnings());setCB(0);setCI(1);setTab("atbats");setScreen("game");};
  const endGame=()=>{if(!confirm("End game and return to schedule?"))return;setScreen("schedule");setGameInfo(null);};

  const GAME_TABS=[{k:"atbats",l:"🎯 At Bats"},{k:"score",l:"⬛ Score"},{k:"stats",l:"📊 Stats"},{k:"summary",l:"📋 Summary"}];
  const hdrPad="max(14px, env(safe-area-inset-top))";
  const btmPad="max(24px, env(safe-area-inset-bottom))";
  const inGame=screen==="game";

  if(authScreen==="landing")return <LandingScreen onLogin={()=>setAuthScreen("login")} onRegister={()=>setAuthScreen("register")}/>;
  if(authScreen==="login")return <LoginScreen onSuccess={onLogin} onBack={()=>setAuthScreen("landing")}/>;
  if(authScreen==="register")return <RegisterScreen onSuccess={onLogin} onBack={()=>setAuthScreen("landing")}/>;

  return <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Barlow',sans-serif"}}>
    <div style={{background:"linear-gradient(135deg,#0a1628 0%,#0d1a14 60%,#0d1117 100%)",borderBottom:"3px solid "+C.gold,padding:`${hdrPad} 16px 14px`,position:"sticky",top:0,zIndex:100}}>
      <div style={{maxWidth:860,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <div onClick={()=>{if(!inGame)setScreen("schedule");}} style={{display:"flex",alignItems:"center",gap:10,cursor:inGame?"default":"pointer"}}>
          <span style={{fontSize:26}}>⚾</span>
          <div>
            <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:19,color:C.gold,letterSpacing:2}}>SLOPITCH TRACKER</div>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:9,color:C.textDim,letterSpacing:3}}>{inGame&&gameInfo?`VS ${(gameInfo.opp||"").toUpperCase()}`:(team?.name||"").toUpperCase()}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {inGame&&<button onClick={()=>setScreen("lineup")} style={{...BTN(C.bgRow,C.textMid),fontSize:12,padding:"6px 11px"}}>✏️ Lineup</button>}
          {inGame&&<button onClick={endGame} style={{...BTN(C.bg,C.red),border:"1px solid "+C.border,fontSize:12,padding:"6px 11px"}}>✕ End</button>}
          {screen==="lineup"&&<button onClick={()=>setScreen("schedule")} style={{...BTN(C.bg,C.textMid),border:"1px solid "+C.border,fontSize:12,padding:"6px 11px"}}>← Back</button>}
          <HamburgerMenu onNav={setScreen} screen={screen} teamName={team?.name||""} onLogout={onLogout}/>
        </div>
      </div>
    </div>
    {inGame&&<div style={{background:C.bgCard,borderBottom:"1px solid "+C.border,position:"sticky",top:63,zIndex:90}}>
      <div style={{maxWidth:860,margin:"0 auto",display:"flex",overflowX:"auto"}}>
        {GAME_TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{background:"none",border:"none",borderBottom:`3px solid ${tab===t.k?C.gold:"transparent"}`,color:tab===t.k?C.gold:C.textMid,padding:"12px 18px",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>{t.l}</button>)}
      </div>
    </div>}
    <div style={{maxWidth:860,margin:"0 auto",padding:`24px 16px ${btmPad}`}}>
      {screen==="schedule"&&<><h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:20,color:C.text,margin:"0 0 20px",letterSpacing:1}}>SCHEDULE</h2><ScheduleView schedule={schedule} onSelect={startGame}/></>}
      {screen==="season"&&<SeasonSummary teamId={team?.teamId} seasons={seasons} setSeasons={setSeasons} roster={roster}/>}
      {screen==="editteam"&&<EditTeam teamId={team?.teamId} roster={roster} setRoster={setRoster}/>}
      {screen==="editseason"&&<EditSeason teamId={team?.teamId} schedule={schedule} setSchedule={setSchedule} teamName={team?.name}/>}
      {screen==="lineup"&&<><h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:20,color:C.text,margin:"0 0 6px",letterSpacing:1}}>SET LINEUP</h2>{gameInfo&&<p style={{fontFamily:"'Oswald',sans-serif",color:C.gold,fontSize:14,margin:"0 0 20px"}}>vs {gameInfo.opp} · {gameInfo.date}</p>}<LineupMgr lineup={lineup} setLineup={setLineup} onConfirm={confirmLineup}/></>}
      {screen==="game"&&tab==="score"&&<Scoreboard innings={innings} setInnings={setInnings} opp={gameInfo?.opp} teamName={team?.name}/>}
      {screen==="game"&&tab==="atbats"&&<AtBats lineup={lineup} setLineup={setLineup} currentBatter={cb} setCurrentBatter={setCB} currentInning={ci} setCurrentInning={setCI} innings={innings} setInnings={setInnings}/>}
      {screen==="game"&&tab==="stats"&&<Stats lineup={lineup}/>}
      {screen==="game"&&tab==="summary"&&<Summary lineup={lineup} innings={innings} opp={gameInfo?.opp} gameInfo={gameInfo} teamId={team?.teamId} teamName={team?.name} seasons={seasons} setSeasons={setSeasons}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
