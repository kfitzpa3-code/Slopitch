async function supaReq(method,path,body){
  const res=await fetch(`${SUPA_URL}/rest/v1/${path}`,{
    method,
    headers:{"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Prefer":"return=representation"},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){const t=await res.text();throw new Error(`Supabase ${method} ${path}: ${res.status} ${t}`);}
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

// Global: teams registry
async function gLoad(k,def){
  try{
    const rows=await supaReq("GET",`spt_global?key=eq.${encodeURIComponent(k)}&select=value`);
    if(rows&&rows.length>0)return JSON.parse(rows[0].value);
    return def;
  }catch(e){
    // fallback to localStorage
    try{const d=localStorage.getItem(`spt_${k}`);return d?JSON.parse(d):def;}catch(e2){return def;}
  }
}
async function gSave(k,v){
  try{
    const existing=await supaReq("GET",`spt_global?key=eq.${encodeURIComponent(k)}&select=key`);
    if(existing&&existing.length>0){
      await supaReq("PATCH",`spt_global?key=eq.${encodeURIComponent(k)}`,{value:JSON.stringify(v)});
    } else {
      await supaReq("POST","spt_global",{key:k,value:JSON.stringify(v)});
    }
    // also keep local copy as cache
    try{localStorage.setItem(`spt_${k}`,JSON.stringify(v));}catch(e){}
  }catch(e){
    // fallback to localStorage only
    try{localStorage.setItem(`spt_${k}`,JSON.stringify(v));}catch(e2){}
  }
}

// Simple hash
async function hashPass(pass){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pass));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── Stat helpers ───────────────────────────────────────────────────────────
function fmt3(n){return n.toFixed(3).replace(/^0/,"");}
function calcStats(atBats){
  const o=atBats.map(a=>a.outcome);
  const s1=o.filter(x=>x==="1B").length,s2=o.filter(x=>x==="2B").length,s3=o.filter(x=>x==="3B").length,hr=o.filter(x=>x==="HR").length;
  const hits=s1+s2+s3+hr;
  // AB: excludes BB, HBP, SAC (same as real baseball)
  const ab=o.filter(x=>!["BB","HBP","SAC"].includes(x)).length;
  const bb=o.filter(x=>x==="BB").length;
  const hbp=o.filter(x=>x==="HBP").length;
  const sac=o.filter(x=>x==="SAC").length;
  const k=o.filter(x=>x==="K").length;
  const e=o.filter(x=>x==="E").length;
  const fc=o.filter(x=>x==="FC").length;
  const r=atBats.filter(a=>a.scored).length,rbi=atBats.reduce((s,a)=>s+(a.rbi||0),0);
  const tb=s1+s2*2+s3*3+hr*4;
  const avg=ab>0?fmt3(hits/ab):".000";
  // OBP: (H + BB + HBP) / (AB + BB + HBP + SAC)
  const obpNum=hits+bb+hbp+sac;
  const obpDen=ab+bb+hbp+sac;
  const obp=obpDen>0?fmt3(obpNum/obpDen):".000";
  const slg=ab>0?fmt3(tb/ab):".000";
  const ops=ab>0?fmt3(parseFloat("0"+obp)+parseFloat("0"+slg)):".000";
  const gp=ab>0||bb>0||hbp>0?1:0;
  return{ab,hits,singles:s1,doubles:s2,triples:s3,hr,bb,hbp,sac,k,e,fc,r,rbi,tb,avg,obp,slg,ops,gp};
}
function totalScore(inn,side){return inn.reduce((s,i)=>s+(parseInt(i[side])||0),0);}
function emptyInnings(){return Array.from({length:TOTAL_INNINGS},()=>({us:"",them:""}));}
function countOuts(lineup,inning){return lineup.filter(p=>p.active).reduce((s,p)=>s+p.atBats.filter(a=>a.inning===inning&&OUTCOMES.find(o=>o.key===a.outcome)?.isOut).reduce((acc,a)=>acc+(a.outcome==="DP"?2:1),0),0);}

// ── CSV parser ─────────────────────────────────────────────────────────────
function parseScheduleCSV(text, teamName){
  const lines=text.trim().split("\n").filter(l=>l.trim());
  // Detect SloPitch export format (Game rows)
  const firstVals=parseCSVLine(lines[0]).map(v=>v.replace(/"/g,"").trim().toUpperCase());
  if(firstVals[0]==="SEASON"||firstVals[0]==="GAME"){
    return parseSloPitchSchedule(lines,teamName);
  }
  // Simple schedule CSV
  const headers=parseCSVLine(lines[0]).map(h=>h.replace(/"/g,"").toUpperCase().trim());
  const games=[];
  const currentYear=new Date().getFullYear();
  for(let i=1;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]).map(v=>v.replace(/"/g,"").trim());
    const row={};
    headers.forEach((h,j)=>{row[h]=vals[j]||"";});
    if(!row.DATE)continue;
    let dateStr=row.DATE;
    if(!/\d{4}/.test(dateStr)){dateStr=dateStr+", "+currentYear;}
    const home=row.HOME||"",away=row.AWAY||"";
    const tName=(teamName||"").toLowerCase();
    const isHome=home.toLowerCase().includes(tName)||(!away.toLowerCase().includes(tName)&&!home.toLowerCase().includes(tName));
    const opp=isHome?(away||home):(home||away);
    games.push({id:"csv_"+i,date:dateStr,time:row.TIME||"",loc:row.PARK||row.LOC||row.LOCATION||"",opp:opp||"TBD",home:home,away:away});
  }
  return games;
}

function parseSloPitchSchedule(lines,teamName){
  // Extract Game rows from SloPitch export: "Game","us","them","datetime","opposition","location"
  const games=[];
  let gameIdx=0;
  for(let i=0;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]).map(v=>v.replace(/"/g,"").trim());
    if(vals[0].toUpperCase()!=="GAME")continue;
    const datetime=vals[3]||"";
    const opp=vals[4]||"TBD";
    const loc=vals[5]||"";
    // Parse datetime "2014-05-13 21:30:00"
    let date="",time="";
    if(datetime){
      const dt=new Date(datetime);
      if(!isNaN(dt)){
        date=dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
        time=dt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).toLowerCase();
      } else {
        date=datetime.split(" ")[0]||datetime;
        time=datetime.split(" ")[1]||"";
      }
    }
    games.push({id:"csv_g"+(++gameIdx),date,time,loc,opp});
  }
  return games;
}

function LoginScreen({onSuccess,onBack}){
  const[name,setName]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const submit=async()=>{
    if(!name.trim()||!pass.trim()){setErr("Please fill in all fields.");return;}
    setLoading(true);setErr("");
    try{
      const teams=await gLoad("teams",{});
      const teamId=Object.keys(teams).find(id=>teams[id].name.toLowerCase()===name.trim().toLowerCase());
      if(!teamId){setErr("Team not found. Check your team name or register.");setLoading(false);return;}
      const h=await hashPass(pass);
      if(teams[teamId].passHash!==h){setErr("Incorrect password.");setLoading(false);return;}
      onSuccess({teamId,...teams[teamId]});
    }catch(e){setErr("Connection error. Please try again.");}
    setLoading(false);
  };

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 20px",background:C.bg}}>
    <div style={{width:"100%",maxWidth:380}}>
      <button onClick={onBack} style={{...BTN(C.bgRow,C.textMid),marginBottom:28,fontSize:13,padding:"6px 14px"}}>← Back</button>
      <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:28,color:C.gold,marginBottom:4}}>SIGN IN</div>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:C.textMid,marginBottom:28}}>Enter your team name and password.</div>
      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:20}}>
        <input style={INP} placeholder="Team name" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        <input style={INP} placeholder="Password" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
      </div>
      {err&&<div style={{background:"#2a0d0d",border:`1px solid ${C.red}`,borderRadius:8,padding:"10px 14px",fontFamily:"'Oswald',sans-serif",fontSize:13,color:C.red,marginBottom:16}}>{err}</div>}
      <button onClick={submit} disabled={loading} style={{...BTN(C.gold,"#000"),width:"100%",padding:"14px",fontSize:16,borderRadius:10,opacity:loading?0.6:1}}>{loading?"Signing in…":"⚡ Sign In"}</button>

      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,letterSpacing:2,color:C.gold,marginBottom:12}}>{editing!==null?"EDIT GAME":"ADD GAME"}</div>

        <input type="date" style={{...INP,flex:"2 1 140px",colorScheme:"dark"}} value={(()=>{try{if(!form.date)return"";const d=new Date(form.date);return isNaN(d)?"":`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}catch(e){return"";}})()}  onChange={e=>{if(e.target.value){const[y,m,d]=e.target.value.split("-").map(Number);const dt=new Date(y,m-1,d);setForm(f=>({...f,date:dt.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}));}}}/>

// ── Season Stats ───────────────────────────────────────────────────────────
function parseCSVLine(line){
  const vals=[];let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){vals.push(cur.trim());cur="";}
    else{cur+=line[i];}
  }
  vals.push(cur.trim());
  return vals;
}

function parseStatCSV(text){
  // Returns either:
  //   array of player objects (summary CSV)
  //   { multiYear: true, byYear: { "2014": { players, wins, losses, ties }, ... } } (SloPitch export)
  const lines=text.trim().split("\n").filter(l=>l.trim());
  const firstVal=parseCSVLine(lines[0])[0].replace(/"/g,"").trim().toUpperCase();
  if(firstVal==="SEASON"||firstVal==="PLAYER"||firstVal==="GAME"||firstVal==="STATS"){
    return {multiYear:true,byYear:parseSloPitchExport(lines)};
  } else {
    return parseSummaryCSV(lines);
  }
}

function parseSloPitchExport(lines){
  // Returns { byYear: { "2014": { players: [...], wins, losses, ties }, ... } }
  // Each player entry has stats accumulated for that year only.

  const byYear={};  // year -> { playerMap, wins, losses, ties }
  let currentSeason=null; // current season year from "Season" rows
  let currentPlayer=null;
  let statsHeaders=null;

  function getYear(dateStr){
    if(!dateStr)return null;
    // "2014-05-13 21:30:00" or similar
    const m=dateStr.match(/\b(\d{4})\b/);
    return m?m[1]:null;
  }

  function ensureYear(yr){
    if(!byYear[yr])byYear[yr]={playerMap:{},wins:0,losses:0,ties:0};
  }

  for(let i=0;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]).map(v=>v.replace(/"/g,"").trim());
    const rowType=vals[0].toUpperCase();

    if(rowType==="SEASON"){
      // "Season","2014","2014-05-13","2014-09-14",...
      currentSeason=vals[1]||null;
      currentPlayer=null;statsHeaders=null;

    } else if(rowType==="GAME"&&currentSeason){
      // "Game","us","them","datetime","opposition","location"
      const us=parseInt(vals[1]);const them=parseInt(vals[2]);
      if(!isNaN(us)&&!isNaN(them)&&us!==1&&them!==1||(us===them&&us!==1)){
        // score of 1-1 is often a forfeit/no-data placeholder — skip
        // but keep actual 1-1 ties if both aren't suspiciously equal forfeits
      }
      // Use datetime to get year, fallback to currentSeason
      const dateStr=vals[3]||"";
      const yr=getYear(dateStr)||currentSeason;
      if(yr&&!isNaN(us)&&!isNaN(them)&&!(us===1&&them===1)){
        ensureYear(yr);
        if(us>them)byYear[yr].wins++;
        else if(them>us)byYear[yr].losses++;
        else byYear[yr].ties++;
      }

    } else if(rowType==="PLAYER"){
      const fname=vals[1]||"";const lname=vals[2]||"";
      currentPlayer=(fname.trim()+" "+lname.trim()).trim();
      statsHeaders=null;

    } else if(rowType===""&&vals[1]&&vals[1].toUpperCase()==="DATE"){
      statsHeaders=vals.slice(1).map(h=>h.toUpperCase());

    } else if(rowType==="STATS"&&currentPlayer&&statsHeaders){
      const row={};
      statsHeaders.forEach((h,j)=>{row[h]=(vals[j+1]||"").trim();});
      // Determine year from the date in this stats row
      const yr=getYear(row["DATE"])||currentSeason;
      if(!yr)continue;
      ensureYear(yr);
      const pm=byYear[yr].playerMap;
      if(!pm[currentPlayer]){
        pm[currentPlayer]={name:currentPlayer,ab:0,r:0,hits:0,singles:0,doubles:0,triples:0,hr:0,bb:0,rbi:0,k:0,sac:0,sb:0,gp:0};
      }
      const p=pm[currentPlayer];
      const ab=parseInt(row["AB"])||0;
      const bb=parseInt(row["BB"])||0;
      if(ab>0||bb>0)p.gp++;
      p.ab+=ab;
      p.hits+=parseInt(row["H"])||0;
      p.singles+=parseInt(row["1B"])||0;
      p.doubles+=parseInt(row["2B"])||0;
      p.triples+=parseInt(row["3B"])||0;
      p.hr+=parseInt(row["HR"])||0;
      p.r+=parseInt(row["R"])||0;
      p.rbi+=parseInt(row["RBI"])||0;
      p.bb+=bb;
      p.k+=parseInt(row["K"])||0;
      p.sac+=(parseInt(row["SH"])||0)+(parseInt(row["SAC"])||0)+(parseInt(row["SF"])||0);
      p.sb+=parseInt(row["SB"])||0;
    }
  }

  // Convert playerMaps to arrays
  const result={};
  Object.entries(byYear).forEach(([yr,data])=>{
    result[yr]={
      players:Object.values(data.playerMap).filter(p=>p.ab>0||p.bb>0),
      wins:data.wins,losses:data.losses,ties:data.ties
    };
  });
  return result;
}

function parseSummaryCSV(lines){
  // Simple summary table: PLAYER,GP,AB,R,H,1B,2B,3B,HR,BB,RBI,SO,SAC,...
  const raw_headers=parseCSVLine(lines[0]).map(h=>h.replace(/"/g,"").toUpperCase().trim());
  const hmap={PLAYER:"name",GP:"gp",AB:"ab",R:"r",H:"h","1B":"singles","2B":"doubles","3B":"triples",HR:"hr",BB:"bb",RBI:"rbi",SO:"k",K:"k",SAC:"sac",SB:"sb",AVG:"avg",SLG:"slg",OB:"obp",OPS:"ops",OBP:"obp"};
  const players=[];
  for(let i=1;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]).map(v=>v.replace(/"/g,"").trim());
    const row={};
    raw_headers.forEach((h,j)=>{if(hmap[h])row[hmap[h]]=vals[j]||"";});
    if(!row.name||row.name.toUpperCase()==="TOTAL"||row.name.toUpperCase()==="TOTALS")continue;
    players.push({name:row.name,gp:parseInt(row.gp)||0,ab:parseInt(row.ab)||0,r:parseInt(row.r)||0,hits:parseInt(row.h)||0,singles:parseInt(row.singles)||0,doubles:parseInt(row.doubles)||0,triples:parseInt(row.triples)||0,hr:parseInt(row.hr)||0,bb:parseInt(row.bb)||0,rbi:parseInt(row.rbi)||0,k:parseInt(row.k)||0,sac:parseInt(row.sac)||0,sb:parseInt(row.sb)||0});
  }
  return players;
}

function ImportStatsModal({teamId,seasons,setSeasons,onClose}){
  const[year,setYear]=useState(new Date().getFullYear()-1+"");
  const[tab,setTab]=useState("csv");
  const[csvMsg,setCsvMsg]=useState("");
  const[csvPlayers,setCsvPlayers]=useState([]);
  const[csvMultiYear,setCsvMultiYear]=useState(null);
  const[manualRows,setManualRows]=useState([{name:"",gp:"",ab:"",r:"",h:"",singles:"",doubles:"",triples:"",hr:"",bb:"",rbi:"",k:"",sac:""}]);
  const fileRef=React.useRef();

  const handleCSV=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const result=parseStatCSV(ev.target.result);
        if(result.multiYear){
          // Multi-year SloPitch export — show summary and import all years
          const years=Object.keys(result.byYear).sort();
          const totalPlayers=new Set(years.flatMap(yr=>result.byYear[yr].players.map(p=>p.name))).size;
          setCsvPlayers([]);
          setCsvMultiYear(result.byYear);
          setCsvMsg(`✓ Found ${years.length} season(s) (${years.join(", ")}) with ${totalPlayers} unique players. Click Import to save all years.`);
        } else {
          if(result.length===0){setCsvMsg("No players found — check format.");return;}
          setCsvPlayers(result);setCsvMultiYear(null);
          setCsvMsg(`✓ Found ${result.length} players. Review below then click Import.`);
        }
      }catch(ex){setCsvMsg("Could not parse CSV: "+ex.message);}
    };
    reader.readAsText(file);
  };

  const addRow=()=>setManualRows(r=>[...r,{name:"",gp:"",ab:"",r:"",h:"",singles:"",doubles:"",triples:"",hr:"",bb:"",rbi:"",k:"",sac:""}]);
  const updRow=(i,k,v)=>setManualRows(rows=>rows.map((r,j)=>j===i?{...r,[k]:v}:r));
  const removeRow=i=>setManualRows(rows=>rows.filter((_,j)=>j!==i));

  const doImport=()=>{
    let updated={...seasons};

    if(tab==="csv"&&csvMultiYear){
      // Multi-year SloPitch export — import each year separately
      Object.entries(csvMultiYear).forEach(([yr,data])=>{
        const importMap={};
        data.players.forEach(p=>{importMap[p.name]=p;});
        // Store W/L record as a special _record entry
        updated[yr]={
          ...(updated[yr]||{}),
          _imported:importMap,
          _record:{wins:data.wins,losses:data.losses,ties:data.ties}
        };
      });
    } else {
      // Single-year import (summary CSV or manual)
      const players=tab==="csv"?csvPlayers:manualRows.filter(r=>r.name.trim()).map(r=>({
        name:r.name.trim(),gp:parseInt(r.gp)||0,ab:parseInt(r.ab)||0,r:parseInt(r.r)||0,
        hits:parseInt(r.h)||0,singles:parseInt(r.singles)||0,doubles:parseInt(r.doubles)||0,
        triples:parseInt(r.triples)||0,hr:parseInt(r.hr)||0,bb:parseInt(r.bb)||0,
        rbi:parseInt(r.rbi)||0,k:parseInt(r.k)||0,sac:parseInt(r.sac)||0,sb:0
      }));
      if(!players.length){setCsvMsg("No player data to import.");return;}
      const importMap={};
      players.forEach(p=>{importMap[p.name]=p;});
      updated[year]={...(updated[year]||{}),_imported:importMap};
    }

    setSeasons(updated);tSave(teamId,"seasons",updated);
    onClose();
  };

  const inp2={background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 8px",color:C.text,fontFamily:"'Oswald',sans-serif",fontSize:12,width:"100%"};
  const cols=["name","gp","ab","r","h","1B","2B","3B","hr","bb","rbi","k","sac"];
  const colLabels=["Player","GP","AB","R","H","1B","2B","3B","HR","BB","RBI","K","SAC"];

  return <div style={{position:"fixed",inset:0,background:"#000d",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:400,overflowY:"auto",padding:"20px 10px"}}>
    <div style={{background:C.bgCard,borderRadius:20,padding:28,width:"100%",maxWidth:700,border:`2px solid ${C.gold}44`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:22,color:C.gold}}>IMPORT PAST SEASON STATS</div>
        <button onClick={onClose} style={{...BTN(C.bgRow,C.textMid),fontSize:18,padding:"4px 12px"}}>✕</button>
      </div>

      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
        <span style={{fontFamily:"'Oswald',sans-serif",fontSize:11,color:C.textDim,letterSpacing:2}}>SEASON YEAR</span>
        <input value={year} onChange={e=>setYear(e.target.value)} style={{...inp2,width:80,textAlign:"center",fontSize:16}} placeholder="2025"/>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:20,background:C.bg,borderRadius:10,padding:4}}>
        {[{k:"csv",l:"📂 Upload CSV"},{k:"manual",l:"✏️ Enter Manually"}].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,background:tab===t.k?C.gold:"transparent",border:"none",color:tab===t.k?"#000":C.textMid,borderRadius:8,padding:"9px 0",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:14}}>{t.l}</button>
        ))}
      </div>

      {tab==="csv"&&<div>
        <div style={{background:C.bgRow,border:`2px dashed ${C.border}`,borderRadius:12,padding:"20px",textAlign:"center",marginBottom:14,cursor:"pointer"}} onClick={()=>fileRef.current?.click()}>
          <div style={{fontSize:28,marginBottom:6}}>📊</div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:14,color:C.text,marginBottom:4}}>Upload Stats CSV</div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,color:C.textDim}}>Columns: PLAYER, GP, AB, R, H, 1B, 2B, 3B, HR, BB, RBI, SO, SAC</div>
          <input ref={fileRef} type="file" accept=".csv,.txt" onChange={handleCSV}/>
        </div>
        {csvMsg&&<div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:csvMsg.startsWith("✓")?C.green:C.red,padding:"8px 12px",background:csvMsg.startsWith("✓")?"#0d2b18":"#2a0d0d",borderRadius:8,marginBottom:12}}>{csvMsg}</div>}
        {csvPlayers.length>0&&<div style={{maxHeight:240,overflowY:"auto",marginBottom:12}}>
          <table style={{borderCollapse:"collapse",width:"100%"}}>
            <thead><tr>{["PLAYER","GP","AB","R","H","HR","RBI","AVG"].map(c=><th key={c} style={TH(c==="PLAYER"?"left":"center")}>{c}</th>)}</tr></thead>
            <tbody>{csvPlayers.map((p,i)=>{
              const avg=p.ab>0?(p.hits/p.ab).toFixed(3).replace(/^0/,""):".000";
              return <tr key={i} style={{background:i%2===0?C.bgCard:C.bgRow}}>
                <td style={{...TD("left"),paddingLeft:8}}>{p.name}</td>
                <td style={TD()}>{p.gp}</td><td style={TD()}>{p.ab}</td>
                <td style={TD()}>{p.r}</td><td style={TD()}>{p.hits}</td>
                <td style={TD()}>{p.hr}</td><td style={TD()}>{p.rbi}</td>
                <td style={{...TD(),color:C.gold,fontWeight:700}}>{avg}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>}
      </div>}

      {tab==="manual"&&<div style={{overflowX:"auto",marginBottom:12}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:600}}>
          <thead><tr>
            {colLabels.map(c=><th key={c} style={{...TH(c==="Player"?"left":"center"),fontSize:10}}>{c}</th>)}
            <th style={TH()}></th>
          </tr></thead>
          <tbody>{manualRows.map((row,i)=><tr key={i}>
            {cols.map(k=><td key={k} style={{padding:"3px 3px",borderBottom:`1px solid ${C.border}`}}>
              <input value={row[k]||""} onChange={e=>updRow(i,k,e.target.value)} style={{...inp2,width:k==="name"?130:36,textAlign:k==="name"?"left":"center"}} placeholder={k==="name"?"Name":""}/></td>)}
            <td style={{padding:"3px"}}><button onClick={()=>removeRow(i)} style={{...BTN(C.bg,C.red),border:`1px solid ${C.border}`,fontSize:11,padding:"4px 8px"}}>✕</button></td>
          </tr>)}</tbody>
        </table>
        <button onClick={addRow} style={{...BTN(C.bgRow,C.textMid),width:"100%",padding:"8px",marginTop:8,fontSize:13}}>+ Add Player Row</button>
      </div>}

      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button onClick={onClose} style={{...BTN(C.bgRow,C.textMid),flex:1,padding:"12px",fontSize:14}}>Cancel</button>
        <button onClick={doImport} style={{...BTN(C.gold,"#000"),flex:2,padding:"12px",fontSize:15}}>✓ Import {year} Stats</button>
      </div>
    </div>
  </div>;
}

        const o=p.atBats.map(a=>a.outcome);
        const s1=o.filter(x=>x==="1B").length,s2=o.filter(x=>x==="2B").length,
              s3=o.filter(x=>x==="3B").length,hr=o.filter(x=>x==="HR").length;
        map[p.name]={name:p.name,
          ab:o.filter(x=>!["BB","HBP","SAC"].includes(x)).length,
          h:s1+s2+s3+hr,s1,s2,s3,hr,
          bb:o.filter(x=>x==="BB").length,
          hbp:o.filter(x=>x==="HBP").length,
          sac:o.filter(x=>x==="SAC").length,
          k:o.filter(x=>x==="K").length,
          r:p.atBats.filter(a=>a.scored).length,
          rbi:p.atBats.reduce((s,a)=>s+(a.rbi||0),0)};
      } else if(p.stats){
        map[p.name]={name:p.name,ab:p.stats.ab||0,h:p.stats.h||0,s1:p.stats.singles||0,s2:p.stats.doubles||0,s3:p.stats.triples||0,hr:p.stats.hr||0,bb:p.stats.bb||0,hbp:p.stats.hbp||0,sac:p.stats.sac||0,k:p.stats.k||0,r:p.stats.r||0,rbi:p.stats.rbi||0};

    const updated={...seasons,[year]:{...seasons[year],[gameKey]:{...game,finalUs:String(scoreUs),finalThem:String(scoreThem),lineup:newLineup}}};
    setSeasons(updated);tSave(teamId,"seasons",updated);onClose();

function SortableStatsTable({players,label,showImportedNote}){
  const[sortCol,setSortCol]=useState("ops");
  const[sortDir,setSortDir]=useState("desc");

  const cols=[
    {key:"name",label:"PLAYER",align:"left",type:"str"},
    {key:"gp",label:"G",align:"center",type:"num"},
    {key:"ab",label:"AB",align:"center",type:"num"},
    {key:"hits",label:"H",align:"center",type:"num"},
    {key:"r",label:"R",align:"center",type:"num"},
    {key:"rbi",label:"RBI",align:"center",type:"num"},
    {key:"hr",label:"HR",align:"center",type:"num"},
    {key:"bb",label:"BB",align:"center",type:"num"},
    {key:"k",label:"K",align:"center",type:"num"},
    {key:"avg",label:"AVG",align:"center",type:"rate"},
    {key:"obp",label:"OBP",align:"center",type:"rate"},
    {key:"slg",label:"SLG",align:"center",type:"rate"},
    {key:"ops",label:"OPS",align:"center",type:"rate"},
  ];

  const handleSort=col=>{
    if(sortCol===col)setSortDir(d=>d==="desc"?"asc":"desc");
    else{setSortCol(col);setSortDir(col==="name"?"asc":"desc");}
  };

  const sorted=[...players].sort((a,b)=>{
    const col=cols.find(c=>c.key===sortCol);
    let av=a[sortCol],bv=b[sortCol];
    if(col?.type==="rate"){av=parseFloat("0"+av)||0;bv=parseFloat("0"+bv)||0;}
    else if(col?.type==="num"){av=av||0;bv=bv||0;}
    else{av=(av||"").toLowerCase();bv=(bv||"").toLowerCase();}
    if(av<bv)return sortDir==="asc"?-1:1;
    if(av>bv)return sortDir==="asc"?1:-1;
    return 0;
  });

  const clr=v=>parseFloat(v)>=0.5?C.green:parseFloat(v)>=0.35?C.gold:C.textMid;

  const SortTH=({col})=>{
    const active=sortCol===col.key;
    const arrow=active?(sortDir==="desc"?"↓":"↑"):"↕";
    return <th onClick={()=>handleSort(col.key)} style={{...TH(col.align),cursor:"pointer",userSelect:"none",color:active?C.gold:C.textMid,background:active?C.bgRow:C.bgCard,transition:"all 0.15s",whiteSpace:"nowrap"}} title={`Sort by ${col.label}`}>
      {col.label} <span style={{fontSize:9,opacity:active?1:0.4,marginLeft:2}}>{arrow}</span>
    </th>;
  };

  return <div>
    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,letterSpacing:2,color:C.gold}}>{label}</div>
      {showImportedNote&&<span style={{color:C.textMid,fontFamily:"'Oswald',sans-serif",fontWeight:400,fontSize:11}}>(game stats + imported combined)</span>}
      <span style={{fontFamily:"'Oswald',sans-serif",fontSize:10,color:C.textDim,marginLeft:"auto"}}>Click any column to sort</span>
    </div>
    <div style={{overflowX:"auto"}}>
      <table style={{borderCollapse:"collapse",width:"100%",minWidth:640}}>
        <thead><tr>{cols.map(col=><SortTH key={col.key} col={col}/>)}</tr></thead>
        <tbody>{sorted.map((r,i)=>(
          <tr key={i} style={{background:i%2===0?C.bgCard:C.bgRow}}>
            <td style={{...TD("left"),fontWeight:600,paddingLeft:12}}>
              {r.name}{r.imported&&<span style={{color:C.textDim,fontSize:10,marginLeft:6}}>imported</span>}
            </td>
            <td style={{...TD(),color:C.textMid}}>{r.gp||0}</td>
            <td style={TD()}>{r.ab}</td>
            <td style={TD()}>{r.hits}</td>
            <td style={{...TD(),color:r.r>0?C.green:C.textDim,fontWeight:r.r>0?700:400}}>{r.r}</td>
            <td style={{...TD(),color:r.rbi>0?C.gold:C.textDim,fontWeight:r.rbi>0?700:400}}>{r.rbi}</td>
            <td style={{...TD(),color:r.hr>0?C.red:C.textDim,fontWeight:r.hr>0?700:400}}>{r.hr}</td>
            <td style={TD()}>{r.bb}</td>
            <td style={{...TD(),color:r.k>0?C.red:C.textDim}}>{r.k}</td>
            {[r.avg,r.obp,r.slg,r.ops].map((v,j)=><td key={j} style={{...TD(),color:clr(v),fontWeight:700}}>{v}</td>)}
          </tr>
        ))}</tbody>
      </table>
    </div>
  </div>;
}

function SeasonSummary({teamId,seasons,setSeasons,roster}){
  const allYears=Object.keys(seasons).sort((a,b)=>b-a);
  const currentYear=new Date().getFullYear().toString();
  const[viewYear,setViewYear]=useState(allYears.includes(currentYear)?currentYear:(allYears[0]||null));
  const[tab,setTab]=useState("season");
  const[showImport,setShowImport]=useState(false);
  const[editGame,setEditGame]=useState(null); // {game, gameKey, year}

  function aggregateGames(gameList, importedMap, importedRecord){
    let wins=importedRecord?importedRecord.wins:0;
    let losses=importedRecord?importedRecord.losses:0;
    let ties=importedRecord?importedRecord.ties:0;
    let runsFor=0,runsAgainst=0;
    const playerMap={};
    // From saved games (scored in-app)
    gameList.forEach(g=>{
      const us=parseInt(g.finalUs)||0,them=parseInt(g.finalThem)||0;
      runsFor+=us;runsAgainst+=them;
      if(us>them)wins++;else if(them>us)losses++;else ties++;
      (g.lineup||[]).forEach(p=>{
        if(!playerMap[p.name])playerMap[p.name]={name:p.name,atBats:[],gpCount:0,summaryStats:null};
        if(p.stats){
          // summary format from manual edit — accumulate directly
          const s=p.stats;
          if(!playerMap[p.name].summaryStats)playerMap[p.name].summaryStats={ab:0,hits:0,singles:0,doubles:0,triples:0,hr:0,bb:0,hbp:0,sac:0,k:0,r:0,rbi:0,gp:0};
          const ss=playerMap[p.name].summaryStats;
          if((s.ab||0)>0||(s.bb||0)>0)ss.gp++;
          ss.ab+=(s.ab||0);ss.hits+=(s.h||0);ss.singles+=(s.singles||0);ss.doubles+=(s.doubles||0);
          ss.triples+=(s.triples||0);ss.hr+=(s.hr||0);ss.bb+=(s.bb||0);ss.hbp+=(s.hbp||0);
          ss.sac+=(s.sac||0);ss.k+=(s.k||0);ss.r+=(s.r||0);ss.rbi+=(s.rbi||0);
        } else {
          const abs=p.atBats||[];
          const hadPA=abs.some(a=>a.outcome);
          if(hadPA)playerMap[p.name].gpCount++;
          playerMap[p.name].atBats=[...playerMap[p.name].atBats,...abs];
        }
      });
    });
    // Calc stats from at-bats
    let players=Object.values(playerMap).filter(p=>p.atBats.length>0||p.summaryStats).map(p=>{
      if(p.summaryStats&&p.atBats.length===0){
        // pure summary — compute rates
        const ss=p.summaryStats;
        const tb=(ss.singles||0)+(ss.doubles||0)*2+(ss.triples||0)*3+(ss.hr||0)*4;
        const avg=ss.ab>0?fmt3(ss.hits/ss.ab):".000";
        const obpD=ss.ab+ss.bb+ss.hbp+ss.sac;
        const obp=obpD>0?fmt3((ss.hits+ss.bb+ss.hbp+ss.sac)/obpD):".000";
        const slg=ss.ab>0?fmt3(tb/ss.ab):".000";
        const ops=ss.ab>0?fmt3(parseFloat("0"+obp)+parseFloat("0"+slg)):".000";
        return{name:p.name,...ss,tb,avg,obp,slg,ops,gp:ss.gp||1};
      }
      const base={name:p.name,...calcStats(p.atBats),gp:p.gpCount||1};
      if(p.summaryStats){
        // merge at-bat stats with summary stats from edited games
        const ss=p.summaryStats;
        base.ab+=(ss.ab||0);base.hits+=(ss.hits||0);base.singles+=(ss.singles||0);
        base.doubles+=(ss.doubles||0);base.triples+=(ss.triples||0);base.hr+=(ss.hr||0);
        base.bb+=(ss.bb||0);base.sac+=(ss.sac||0);base.k+=(ss.k||0);
        base.r+=(ss.r||0);base.rbi+=(ss.rbi||0);base.gp+=(ss.gp||0);
        const tb=base.singles+base.doubles*2+base.triples*3+base.hr*4;
        base.avg=base.ab>0?fmt3(base.hits/base.ab):".000";
        const obpD=base.ab+base.bb+base.sac;
        base.obp=obpD>0?fmt3((base.hits+base.bb+base.sac)/obpD):".000";
        base.slg=base.ab>0?fmt3(tb/base.ab):".000";
        base.ops=base.ab>0?fmt3(parseFloat("0"+base.obp)+parseFloat("0"+base.slg)):".000";
      }
      return base;
    });
    // Merge imported stats — if player exists in both, sum the raw counting stats
    if(importedMap){
      Object.values(importedMap).forEach(imp=>{
        const existing=players.find(p=>p.name.toLowerCase()===imp.name.toLowerCase());
        if(existing){
          // merge counting stats
          existing.ab+=imp.ab||0;existing.hits+=(imp.hits||0);existing.singles+=(imp.singles||0);
          existing.doubles+=(imp.doubles||0);existing.triples+=(imp.triples||0);existing.hr+=(imp.hr||0);
          existing.bb+=(imp.bb||0);existing.k+=(imp.k||0);existing.sac+=(imp.sac||0);
          existing.r+=(imp.r||0);existing.rbi+=(imp.rbi||0);
          existing.gp=(existing.gp||0)+(imp.gp||0);
          // recalc rates
          const{ab,hits,bb,sac,singles,doubles,triples,hr}=existing;
          const tb=singles+doubles*2+triples*3+hr*4;
          existing.avg=ab>0?fmt3(hits/ab):".000";
          existing.obp=(ab+bb+sac)>0?fmt3((hits+bb+sac)/(ab+bb+sac)):".000";
          existing.slg=ab>0?fmt3(tb/ab):".000";
          existing.ops=ab>0?fmt3(parseFloat("0"+existing.obp)+parseFloat("0"+existing.slg)):".000";
        } else {
          // imported only — compute rates
          const ab=imp.ab||0,hits=imp.hits||0,bb=imp.bb||0,sac=imp.sac||0;
          const singles=imp.singles||0,doubles=imp.doubles||0,triples=imp.triples||0,hr=imp.hr||0;
          const tb=singles+doubles*2+triples*3+hr*4;
          const avg=ab>0?fmt3(hits/ab):".000";
          const obp=(ab+bb+sac)>0?fmt3((hits+bb+sac)/(ab+bb+sac)):".000";
          const slg=ab>0?fmt3(tb/ab):".000";
          const ops=ab>0?fmt3(parseFloat("0"+obp)+parseFloat("0"+slg)):".000";
          const gp=imp.gp||0;
          players.push({name:imp.name,ab,hits,singles,doubles,triples,hr,bb,k:imp.k||0,sac,r:imp.r||0,rbi:imp.rbi||0,tb,avg,obp,slg,ops,gp,imported:true});
        }
      });
      // wins/losses from imported season not tracked (no game-by-game data)
    }
    // Total games = scored games + imported record games (if no overlap)
    const importedGames=importedRecord?(importedRecord.wins+importedRecord.losses+importedRecord.ties):0;
    const scoredGames=gameList.length;
    const totalGames=scoredGames+importedGames;
    return{wins,losses,ties,runsFor,runsAgainst,games:totalGames,players};
  }

  // For alltime, aggregate across all years
  function aggregateAllTime(){
    const allGames=Object.entries(seasons).flatMap(([yr,ydata])=>Object.entries(ydata).filter(([k])=>!k.startsWith("_")).map(([,v])=>v));
    const allImported={};
    // Sum imported W/L records across all years
    const combinedRecord={wins:0,losses:0,ties:0};
    let hasRecord=false;
    Object.entries(seasons).forEach(([yr,ydata])=>{
      if(ydata._record){
        combinedRecord.wins+=ydata._record.wins||0;
        combinedRecord.losses+=ydata._record.losses||0;
        combinedRecord.ties+=ydata._record.ties||0;
        hasRecord=true;
      }
      if(ydata._imported){Object.values(ydata._imported).forEach(p=>{
        if(!allImported[p.name])allImported[p.name]={...p};
        else{
          allImported[p.name].ab+=(p.ab||0);allImported[p.name].hits+=(p.hits||0);
          allImported[p.name].singles+=(p.singles||0);allImported[p.name].doubles+=(p.doubles||0);
          allImported[p.name].triples+=(p.triples||0);allImported[p.name].hr+=(p.hr||0);
          allImported[p.name].bb+=(p.bb||0);allImported[p.name].k+=(p.k||0);
          allImported[p.name].sac+=(p.sac||0);allImported[p.name].r+=(p.r||0);
          allImported[p.name].rbi+=(p.rbi||0);allImported[p.name].gp=(allImported[p.name].gp||0)+(p.gp||0);
        }
      });}
    });
    return aggregateGames(allGames,Object.keys(allImported).length>0?allImported:null,hasRecord?combinedRecord:null);
  }

  const yearData=viewYear&&seasons[viewYear]?seasons[viewYear]:{};
  const yearGames=Object.entries(yearData).filter(([k])=>!k.startsWith("_")).map(([,v])=>v);
  const yearImported=yearData._imported||null;
  const yearRecord=yearData._record||null; // imported W/L record
  const data=tab==="alltime"?aggregateAllTime():aggregateGames(yearGames,yearImported,yearRecord);
  const{wins,losses,ties,runsFor,runsAgainst,games,players}=data;
  const pct=games>0?fmt3(wins/games):".000";
  const sorted=[...players].sort((a,b)=>parseFloat(b.ops)-parseFloat(a.ops));
  const clr=v=>parseFloat(v)>=0.5?C.green:parseFloat(v)>=0.35?C.gold:C.textMid;

  const deleteGame=(year,key)=>{
    if(!confirm("Remove this saved game?"))return;
    setSeasons(prev=>{
      const u={...prev,[year]:{...prev[year]}};
      delete u[year][key];
      if(Object.keys(u[year]).filter(k=>!k.startsWith("_")).length===0&&!u[year]._imported)delete u[year];
      tSave(teamId,"seasons",u);return u;
    });
  };

  const deleteImported=year=>{
    if(!confirm(`Remove imported stats and record for ${year}?`))return;
    setSeasons(prev=>{
      const u={...prev,[year]:{...prev[year]}};
      delete u[year]._imported;
      delete u[year]._record;
      if(Object.keys(u[year]).filter(k=>!k.startsWith("_")).length===0)delete u[year];
      tSave(teamId,"seasons",u);return u;
    });
  };

  const SB=({label,value,sub,color=C.text})=>(
    <div style={{background:C.bgRow,borderRadius:12,padding:"13px 14px",textAlign:"center",flex:"1 1 85px"}}>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:10,color:C.textDim,letterSpacing:2,marginBottom:3}}>{label}</div>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:900,color,lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,color:C.textMid,marginTop:3}}>{sub}</div>}
    </div>
  );

  return <div>
    {showImport&&<ImportStatsModal teamId={teamId} seasons={seasons} setSeasons={setSeasons} onClose={()=>setShowImport(false)}/>}
    {editGame&&<EditGameModal game={editGame.game} gameKey={editGame.gameKey} year={editGame.year} teamId={teamId} roster={roster} seasons={seasons} setSeasons={setSeasons} onClose={()=>setEditGame(null)}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:20,color:C.text,margin:0,letterSpacing:1}}>SEASON STATISTICS</h2>
      <button onClick={()=>setShowImport(true)} style={{...BTN(C.bgCard,C.gold),border:`1px solid ${C.gold}44`,padding:"9px 18px",fontSize:13}}>📥 Import Past Season</button>
    </div>

    <div style={{display:"flex",gap:8,marginBottom:20,background:C.bgCard,borderRadius:10,padding:4}}>
      {[{k:"season",l:"📅 By Season"},{k:"alltime",l:"🏆 All-Time"}].map(t=>(
        <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,background:tab===t.k?C.gold:"transparent",border:"none",color:tab===t.k?"#000":C.textMid,borderRadius:8,padding:"10px 0",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:14}}>{t.l}</button>
      ))}
    </div>

    {tab==="season"&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20,alignItems:"center"}}>
      <span style={{fontFamily:"'Oswald',sans-serif",fontSize:11,color:C.textDim,letterSpacing:2}}>YEAR</span>
      {allYears.length===0
        ?<span style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:C.textDim}}>No seasons yet. Import a past season or save a game.</span>
        :allYears.map(y=><button key={y} onClick={()=>setViewYear(y)} style={{background:viewYear===y?C.gold:C.bgRow,border:`2px solid ${viewYear===y?C.gold:C.border}`,color:viewYear===y?"#000":C.textMid,borderRadius:8,padding:"5px 16px",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:15}}>{y}{y===currentYear?" ★":""}</button>)
      }
    </div>}

    {tab==="alltime"&&<div style={{background:`${C.gold}18`,border:`1px solid ${C.gold}44`,borderRadius:12,padding:"10px 16px",marginBottom:20}}>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:C.gold,fontWeight:700}}>ALL-TIME — {allYears.length} Season{allYears.length!==1?"s":""}{allYears.length>0?` (${allYears.join(", ")})`:""}</div>
    </div>}

    {(tab==="alltime"||(tab==="season"&&viewYear))&&<>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
        <SB label="WINS" value={wins} color={C.green}/><SB label="LOSSES" value={losses} color={C.red}/>
        {ties>0&&<SB label="TIES" value={ties}/>}
        <SB label="WIN %" value={games>0?pct:"—"} sub={`${games} games`} color={games>0&&parseFloat(pct)>=0.5?C.green:games>0?C.red:C.textMid}/>
        {runsFor>0&&<SB label="RUNS FOR" value={runsFor} color={C.gold}/>}
        {runsAgainst>0&&<SB label="AGAINST" value={runsAgainst} color={C.textMid}/>}
        {(runsFor>0||runsAgainst>0)&&<SB label="DIFF" value={(runsFor-runsAgainst>0?"+":"")+(runsFor-runsAgainst)} color={runsFor>=runsAgainst?C.green:C.red}/>}
      </div>

      {tab==="season"&&viewYear&&<div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,letterSpacing:2,color:C.gold}}>GAME LOG</div>
          {(yearData._imported||yearData._record)&&<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            {yearData._record&&<span style={{fontFamily:"'Oswald',sans-serif",fontSize:11,color:C.textMid}}>📥 Record: {yearData._record.wins}W-{yearData._record.losses}L{yearData._record.ties>0?`-${yearData._record.ties}T`:""} (imported)</span>}
            {yearData._imported&&<span style={{fontFamily:"'Oswald',sans-serif",fontSize:11,color:C.textMid}}>{yearData._record?"·":""} Player stats imported</span>}
            <button onClick={()=>deleteImported(viewYear)} style={{...BTN(C.bg,C.red),border:`1px solid ${C.border}`,fontSize:11,padding:"3px 10px"}}>Remove Imported</button>
          </div>}
        </div>
        {yearGames.length===0&&!yearData._imported
          ?<div style={{color:C.textDim,fontFamily:"'Oswald',sans-serif",fontSize:13}}>No games saved yet. Save a completed game or import past stats above.</div>
          :yearGames.map((g,gi)=>{
            const key=Object.entries(yearData).filter(([k])=>!k.startsWith("_")).find(([,v])=>v===g)?.[0]||gi;
            const us=parseInt(g.finalUs)||0,them=parseInt(g.finalThem)||0;
            const result=us>them?"W":them>us?"L":"T";
            const rc={W:C.green,L:C.red,T:C.textMid}[result];
            return <div key={key} style={{display:"flex",alignItems:"center",gap:12,background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:6,flexWrap:"wrap"}}>
              <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:20,color:rc,minWidth:24}}>{result}</div>
              <div style={{flex:1}}><div style={{fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:14,color:C.text}}>vs {g.opp}</div><div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,color:C.textMid}}>{g.date}{g.loc?` · ${g.loc}`:""}</div></div>
              <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:20,color:rc}}>{us}–{them}</div>
              <button onClick={()=>setEditGame({game:g,gameKey:key,year:viewYear})} style={{...BTN(C.bgRow,C.gold),border:"1px solid "+C.gold+"44",fontSize:12,padding:"4px 10px"}}>✏️ Edit</button>
              <button onClick={()=>deleteGame(viewYear,key)} style={{...BTN(C.bg,C.red),border:`1px solid ${C.border}`,fontSize:12,padding:"4px 10px"}}>✕</button>
            </div>;
          })
        }
      </div>}

      {players.length>0&&<SortableStatsTable players={players} label={tab==="alltime"?"ALL-TIME PLAYER STATS":"PLAYER STATS — "+viewYear} showImportedNote={tab==="season"&&!!yearData._imported}/>}

      {players.length===0&&games===0&&!yearData?._imported&&<div style={{textAlign:"center",padding:"30px 20px"}}><div style={{fontSize:40,marginBottom:10}}>📊</div><div style={{fontFamily:"'Oswald',sans-serif",fontSize:15,color:C.textMid}}>No data yet for this season.</div><div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,color:C.textDim,marginTop:6}}>Save a completed game or use "Import Past Season" above.</div></div>}
    </>}
  </div>;
}

// ── Schedule view ──────────────────────────────────────────────────────────
function ScheduleView({schedule,onSelect}){
  const today=new Date();today.setHours(0,0,0,0);
  const up=schedule.filter(g=>!g.date||new Date(g.date)>=today);
  const past=schedule.filter(g=>g.date&&new Date(g.date)<today);
  const Row=({g,old})=><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:old?C.bg:C.bgCard,border:`1px solid ${old?C.border:C.gold+"44"}`,borderRadius:10,padding:"12px 16px",marginBottom:8,opacity:old?0.45:1,flexWrap:"wrap",gap:8}}>
    <div>
      <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:15,color:old?C.textMid:C.text}}>{g.opp}</div>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:12,color:C.textMid,marginTop:2}}>{g.date}{g.time?` · ${g.time}`:""}{g.loc&&<> · <span style={{color:C.gold}}>{g.loc}</span></>}</div>
    </div>
    {!old&&<button onClick={()=>onSelect(g)} style={{...BTN(C.gold,"#000"),fontSize:13,padding:"7px 16px"}}>Score This Game →</button>}
  </div>;
  return <div>
    <h3 style={{fontFamily:"'Oswald',sans-serif",color:C.gold,fontSize:13,letterSpacing:2,marginBottom:12}}>UPCOMING</h3>
    {up.length===0&&<p style={{color:C.textDim,fontFamily:"'Oswald',sans-serif",fontSize:13,marginBottom:16}}>No upcoming games.</p>}
    {up.map((g,i)=><Row key={g.id||i} g={g} old={false}/>)}
    {past.length>0&&<><h3 style={{fontFamily:"'Oswald',sans-serif",color:C.textDim,fontSize:13,letterSpacing:2,margin:"24px 0 12px"}}>PAST</h3>{past.map((g,i)=><Row key={g.id||i} g={g} old={true}/>)}</>}
  </div>;
}

// ── Lineup Manager ─────────────────────────────────────────────────────────
function LineupMgr({lineup,setLineup,onConfirm}){
  const active=lineup.filter(p=>p.active);
  const move=(i,d)=>{const n=[...lineup];const j=i+d;if(j<0||j>=n.length)return;[n[i],n[j]]=[n[j],n[i]];setLineup(n);};
  const tog=i=>setLineup(prev=>prev.map((p,x)=>x===i?{...p,active:!p.active}:p));
  return <div>
    <p style={{color:C.textMid,fontFamily:"'Oswald',sans-serif",fontSize:13,marginBottom:16}}>Remove absent players, set batting order. <strong style={{color:C.text}}>{active.length} active.</strong></p>
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
      {lineup.map((p,i)=><div key={p.name} style={{display:"flex",alignItems:"center",gap:10,background:p.active?C.bgCard:C.bg,border:`1px solid ${p.active?C.gold+"44":C.border}`,borderRadius:10,padding:"10px 14px",opacity:p.active?1:0.4}}>
        <span style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:16,color:p.active?C.gold:C.textDim,minWidth:22,textAlign:"center"}}>{p.active?active.indexOf(p)+1:"—"}</span>
        <span style={{flex:1,fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:15,color:p.active?C.text:C.textDim}}>{p.name}</span>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <button onClick={()=>move(i,-1)} disabled={i===0} style={{background:C.bgRow,border:"none",color:C.textMid,borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:11,opacity:i===0?0.2:1}}>▲</button>
          <button onClick={()=>move(i,1)} disabled={i===lineup.length-1} style={{background:C.bgRow,border:"none",color:C.textMid,borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:11,opacity:i===lineup.length-1?0.2:1}}>▼</button>
        </div>
        <button onClick={()=>tog(i)} style={{background:p.active?C.bgRow:C.bg,border:`1px solid ${p.active?C.border:C.textDim}`,color:p.active?C.red:C.textDim,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontWeight:700,fontSize:13}}>{p.active?"✕ Out":"+ In"}</button>
      </div>)}
    </div>
    <button onClick={onConfirm} style={{...BTN(C.gold,"#000"),width:"100%",padding:14,fontSize:16}}>✓ Lock In Lineup & Start Scoring</button>
  </div>;
}

// ── Scoreboard ─────────────────────────────────────────────────────────────
function Scoreboard({innings,setInnings,opp,teamName}){
  const upd=(i,side,v)=>setInnings(prev=>prev.map((inn,x)=>x===i?{...inn,[side]:v.replace(/\D/g,"").slice(0,2)}:inn));
  const us=totalScore(innings,"us"),them=totalScore(innings,"them");
  return <div>
    <div style={{overflowX:"auto",marginBottom:24}}>
      <table style={{borderCollapse:"collapse",width:"100%",minWidth:460}}>
        <thead><tr><th style={TH("left")}>TEAM</th>{innings.map((_,i)=><th key={i} style={TH()}>{i+1}</th>)}<th style={{...TH(),color:C.gold}}>R</th></tr></thead>
        <tbody>{[{label:`🔴 ${teamName||"Our Team"}`,side:"us",ac:C.gold},{label:opp||"Opponent",side:"them",ac:C.textMid}].map(({label,side,ac})=><tr key={side}>
          <td style={{...TD("left"),color:ac,fontWeight:700,whiteSpace:"nowrap"}}>{label}</td>
          {innings.map((inn,i)=><td key={i} style={{...TD(),padding:"4px 5px"}}><input value={inn[side]} onChange={e=>upd(i,side,e.target.value)} style={{width:32,textAlign:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontFamily:"'Oswald',sans-serif",fontSize:15,padding:"4px 0"}}/></td>)}
          <td style={{...TD(),fontWeight:900,fontSize:24,color:ac}}>{totalScore(innings,side)}</td>
        </tr>)}</tbody>
      </table>
    </div>
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:32,background:C.bg,borderRadius:20,padding:"28px 32px"}}>
      <div style={{textAlign:"center"}}><div style={{color:C.textMid,fontFamily:"'Oswald',sans-serif",fontSize:11,letterSpacing:3}}>{(teamName||"OUR TEAM").toUpperCase()}</div><div style={{color:C.gold,fontFamily:"'Oswald',sans-serif",fontSize:80,fontWeight:900,lineHeight:1}}>{us}</div></div>

function getInitials(name){

function Diamond({bases,setBases,onScored}){
  // onScored(runnerName) called when a runner is dragged/tapped to home
  const[dragging,setDragging]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const basePositions={
    second:{top:0,left:"50%",transform:"translateX(-50%) rotate(45deg)"},
    third:{top:"50%",left:0,transform:"translateY(-50%) rotate(45deg)"},
    first:{top:"50%",right:0,transform:"translateY(-50%) rotate(45deg)"},
  };

  const scoreRunner=(name)=>{
    // Remove from whichever base they're on
    setBases(prev=>{
      const updated={...prev};
      Object.keys(updated).forEach(b=>{if(updated[b]===name)updated[b]=null;});
      return updated;
    });
    if(onScored)onScored(name);
  };

  const doMove=(from,to)=>{
    if(from===to){setDragging(null);return;}
    if(to==="home"){scoreRunner(bases[from]);setDragging(null);return;}
    setBases(prev=>{const runner=prev[from];const swap=prev[to];return{...prev,[from]:swap||null,[to]:runner};});
    setDragging(null);
  };

  const handleClick=(b)=>{
    if(dragging){doMove(dragging,b);setDragging(null);}
    else if(bases[b])setDragging(b);
  };
  const handleHomeClick=()=>{
    if(dragging){doMove(dragging,"home");setDragging(null);}
  };
  const handleDragStart=(e,b)=>{if(!bases[b])return;setDragging(b);e.dataTransfer.effectAllowed="move";};
  const handleDrop=(e,b)=>{e.preventDefault();if(dragging)doMove(dragging,b);setDragging(null);setDragOver(null);};
  const handleHomeDrop=(e)=>{e.preventDefault();if(dragging)doMove(dragging,"home");setDragging(null);setDragOver(null);};

  const homeOver=dragOver==="home";

  return <div style={{position:"relative",width:90,height:90,flexShrink:0}} onDragOver={e=>e.preventDefault()}>
    {Object.entries(basePositions).map(([b,s])=>{
      const occ=!!bases[b];
      const sel=dragging===b;
      const over=dragOver===b;
      return <div key={b} draggable={occ}
        onClick={()=>handleClick(b)}
        onDragStart={e=>handleDragStart(e,b)}
        onDragEnter={()=>setDragOver(b)}
        onDragLeave={()=>setDragOver(v=>v===b?null:v)}
        onDrop={e=>handleDrop(e,b)}
        title={occ?`${b.toUpperCase()}: ${bases[b]}`:`${b.toUpperCase()}: empty`}
        style={{position:"absolute",width:26,height:26,borderRadius:3,cursor:occ?(sel?"grabbing":"grab"):dragging?"copy":"default",border:`2px solid ${sel?"#fff":over?C.text:occ?C.gold:dragging?C.gold+"66":C.border}`,background:sel?"#fff4":over?C.gold+"55":occ?C.gold:C.bgCard,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.1s",opacity:sel?0.5:1,...s}}>
        {occ&&<span style={{fontFamily:"'Oswald',sans-serif",fontSize:8,fontWeight:900,color:sel?"#888":"#000",transform:"rotate(-45deg)",lineHeight:1,userSelect:"none",pointerEvents:"none"}}>{getInitials(bases[b])}</span>}
      </div>;
    })}
    {/* Home plate — tap target when dragging */}
    <div
      onClick={handleHomeClick}
      onDragEnter={()=>setDragOver("home")}
      onDragLeave={()=>setDragOver(v=>v==="home"?null:v)}
      onDrop={handleHomeDrop}
      title={dragging?"Drop here to score runner":"Home plate"}
      style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%) rotate(45deg)",width:16,height:16,background:homeOver?C.green:C.border,borderRadius:2,border:`2px solid ${homeOver?C.green:dragging?C.green+"88":C.textDim}`,cursor:dragging?"copy":"default",transition:"all 0.15s"}}/>
    {dragging&&<div style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",fontFamily:"'Oswald',sans-serif",fontSize:8,color:C.gold,whiteSpace:"nowrap",letterSpacing:1,pointerEvents:"none"}}>TAP HOME TO SCORE</div>}
  </div>;
}
